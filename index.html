<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Thêm Furigana & Xuất File Word (Bản Siêu Tốc)</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --border: #D1D5DB;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }
        
        p.subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .box {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        textarea, .output-area {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.6;
            box-sizing: border-box;
            resize: vertical;
        }

        .output-area {
            background-color: #F9FAFB;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #E63946; 
        }

        .actions {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        .btn-export {
            background-color: #10B981;
        }

        .btn-export:hover {
            background-color: #059669;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #D97706; 
            font-weight: 600;
        }
    </style>
    
    <!-- Đã đổi sang máy chủ Fastly (JSDelivr) siêu ổn định chống lỗi mạng -->
    <script src="https://fastly.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>🇯🇵 Trình Tạo Furigana Song Ngữ 🇻🇳</h1>
        <p class="subtitle">Tự động nhận diện Kanji và thêm Furigana (Hiragana), hỗ trợ xuất trực tiếp ra Microsoft Word.</p>

        <div class="grid">
            <div class="box">
                <label for="inputText">Nhập văn bản (hỗ trợ cả Việt & Nhật trộn lẫn):</label>
                <textarea id="inputText" placeholder="Ví dụ: Hôm nay tôi học 漢字 (Kanji) rất chăm chỉ. 日本語を勉強します。"></textarea>
            </div>
            
            <div class="box">
                <label>Kết quả (Xem trước):</label>
                <div id="outputArea" class="output-area">Kết quả sẽ hiển thị ở đây...</div>
            </div>
        </div>

        <div class="actions">
            <button id="convertBtn" onclick="addFurigana()" disabled>
                ⏳ Đang tải từ điển...
            </button>
            <button id="exportBtn" class="btn-export" onclick="exportToWord()" style="display: none;">
                📄 Xuất ra file Word (.doc)
            </button>
        </div>

        <div id="status">Hệ thống đang tải bộ từ điển tiếng Nhật (khoảng vài giây), vui lòng đợi...</div>
    </div>

    <script>
        let kuroshiro;
        let isReady = false;

        window.onload = async function() {
            try {
                // Kiểm tra xem thư viện đã tải thành công chưa
                if (typeof Kuroshiro === 'undefined') {
                    throw new Error("Không thể tải thư viện cốt lõi từ máy chủ. Vui lòng tải lại trang (F5).");
                }

                // Xử lý linh hoạt cách khởi tạo để tránh lỗi "not a constructor"
                const KuroshiroClass = Kuroshiro.default || Kuroshiro;
                kuroshiro = new KuroshiroClass();
                
                // Trỏ thẳng vào thư mục dict nằm trên GitHub của bạn
                await kuroshiro.init(new KuromojiAnalyzer({ 
                    dictPath: "dict/" 
                }));
                
                isReady = true;
                
                const btn = document.getElementById('convertBtn');
                btn.innerHTML = "✨ Thêm Furigana";
                btn.disabled = false;
                
                document.getElementById('status').innerText = "✅ Hệ thống đã sẵn sàng!";
                document.getElementById('status').style.color = "#10B981"; 
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "❌ Lỗi: " + error.message;
                document.getElementById('status').style.color = "#DC2626";
            }
        };

        async function addFurigana() {
            if (!isReady) return;

            const text = document.getElementById('inputText').value;
            if (!text.trim()) {
                alert("Vui lòng nhập văn bản!");
                return;
            }

            const btn = document.getElementById('convertBtn');
            btn.innerHTML = "⏳ Đang xử lý...";
            btn.disabled = true;

            try {
                const result = await kuroshiro.convert(text, { 
                    mode: "furigana", 
                    to: "hiragana" 
                });
                
                const formattedResult = result.replace(/\n/g, "<br>");
                document.getElementById('outputArea').innerHTML = formattedResult;
                document.getElementById('exportBtn').style.display = "flex";
                
            } catch (error) {
                console.error(error);
                alert("Có lỗi xảy ra trong quá trình xử lý!");
            } finally {
                btn.innerHTML = "✨ Thêm Furigana";
                btn.disabled = false;
            }
        }

        function exportToWord() {
            const outputArea = document.getElementById('outputArea');
            if (!outputArea.innerText.trim()) {
                alert("Không có nội dung để xuất!");
                return;
            }

            const preHtml = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Tài liệu tiếng Nhật</title><style>body { font-family: 'Yu Mincho', 'MS Mincho', serif; font-size: 14pt; } ruby { ruby-align: center; } rt { font-size: 8pt; }</style></head><body>";
            const postHtml = "</body></html>";
            
            const html = preHtml + outputArea.innerHTML + postHtml;
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
            
            const filename = 'TaiLieu_SongNgu_Furigana.doc';
            const downloadLink = document.createElement("a");
            document.body.appendChild(downloadLink);
            
            if (navigator.msSaveOrOpenBlob) {
                navigator.msSaveOrOpenBlob(blob, filename); 
            } else {
                downloadLink.href = url;
                downloadLink.download = filename;
                downloadLink.click(); 
            }
            
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
