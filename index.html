<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Thêm Furigana & Xuất File Word (Đã sửa lỗi tải)</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --border: #D1D5DB;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }
        
        p.subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .box {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        textarea, .output-area {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.6;
            box-sizing: border-box;
            resize: vertical;
        }

        .output-area {
            background-color: #F9FAFB;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Tùy chỉnh hiển thị Furigana trong trình duyệt */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #E63946; /* Màu đỏ cho Furigana dễ nhìn */
        }

        .actions {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        .btn-export {
            background-color: #10B981; /* Màu xanh lá cho Word */
        }

        .btn-export:hover {
            background-color: #059669;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #D97706; /* Màu vàng cam khi tải */
            font-weight: 600;
        }
    </style>
    <!-- Đã đổi tất cả thư viện sang unpkg.com để tránh lỗi mạng -->
    <script src="https://unpkg.com/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
    <script src="https://unpkg.com/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>🇯🇵 Trình Tạo Furigana Song Ngữ 🇻🇳</h1>
        <p class="subtitle">Tự động nhận diện Kanji và thêm Furigana (Hiragana), hỗ trợ xuất trực tiếp ra Microsoft Word.</p>

        <div class="grid">
            <div class="box">
                <label for="inputText">Nhập văn bản (hỗ trợ cả Việt & Nhật trộn lẫn):</label>
                <textarea id="inputText" placeholder="Ví dụ: Hôm nay tôi học 漢字 (Kanji) rất chăm chỉ. 日本語を勉強します。"></textarea>
            </div>
            
            <div class="box">
                <label>Kết quả (Xem trước):</label>
                <div id="outputArea" class="output-area">Kết quả sẽ hiển thị ở đây...</div>
            </div>
        </div>

        <div class="actions">
            <button id="convertBtn" onclick="addFurigana()" disabled>
                ⏳ Đang tải từ điển...
            </button>
            <button id="exportBtn" class="btn-export" onclick="exportToWord()" style="display: none;">
                📄 Xuất ra file Word (.doc)
            </button>
        </div>

        <div id="status">Hệ thống đang tải bộ từ điển tiếng Nhật (khoảng vài giây), vui lòng đợi...</div>
    </div>

    <script>
        let kuroshiro;
        let isReady = false;

        // Khởi tạo thư viện ngay khi trang web tải xong
        window.onload = async function() {
            try {
                kuroshiro = new Kuroshiro();
                // Đã đổi link từ điển sang unpkg
                await kuroshiro.init(new KuromojiAnalyzer({ 
                    dictPath: "https://unpkg.com/kuromoji@0.1.2/dict/" 
                }));
                
                isReady = true;
                
                // Cập nhật giao diện khi đã sẵn sàng
                const btn = document.getElementById('convertBtn');
                btn.innerHTML = "✨ Thêm Furigana";
                btn.disabled = false;
                
                document.getElementById('status').innerText = "✅ Hệ thống đã sẵn sàng!";
                document.getElementById('status').style.color = "#10B981"; // Đổi sang màu xanh
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "❌ Lỗi khi tải từ điển. Hãy kiểm tra kết nối mạng của bạn.";
                document.getElementById('status').style.color = "#DC2626";
            }
        };

        // Hàm xử lý thêm Furigana
        async function addFurigana() {
            if (!isReady) return;

            const text = document.getElementById('inputText').value;
            if (!text.trim()) {
                alert("Vui lòng nhập văn bản!");
                return;
            }

            const btn = document.getElementById('convertBtn');
            btn.innerHTML = "⏳ Đang xử lý...";
            btn.disabled = true;

            try {
                // Kuroshiro xử lý tự động phân biệt tiếng Nhật và ngôn ngữ khác
                const result = await kuroshiro.convert(text, { 
                    mode: "furigana", 
                    to: "hiragana" 
                });
                
                // Thay thế các xuống dòng thành thẻ <br> để HTML hiểu
                const formattedResult = result.replace(/
/g, "<br>");
                document.getElementById('outputArea').innerHTML = formattedResult;

                // Hiển thị nút Xuất Word
                document.getElementById('exportBtn').style.display = "flex";
                
            } catch (error) {
                console.error(error);
                alert("Có lỗi xảy ra trong quá trình xử lý!");
            } finally {
                btn.innerHTML = "✨ Thêm Furigana";
                btn.disabled = false;
            }
        }

        // Hàm xuất kết quả HTML có thẻ <ruby> ra file MS Word
        function exportToWord() {
            const outputArea = document.getElementById('outputArea');
            if (!outputArea.innerText.trim()) {
                alert("Không có nội dung để xuất!");
                return;
            }

            // Gói HTML cơ bản để Word nhận diện đúng định dạng và font chữ
            const preHtml = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Tài liệu tiếng Nhật</title><style>body { font-family: 'Yu Mincho', 'MS Mincho', serif; font-size: 14pt; } ruby { ruby-align: center; } rt { font-size: 8pt; }</style></head><body>";
            const postHtml = "</body></html>";
            
            // Lấy HTML đang hiển thị (chứa sẵn các thẻ <ruby>)
            const html = preHtml + outputArea.innerHTML + postHtml;

            // Tạo file Blob định dạng .doc (MS Word)
            const blob = new Blob(['﻿', html], { type: 'application/msword' });
            const url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
            
            // Tên file tải về
            const filename = 'TaiLieu_SongNgu_Furigana.doc';
            
            // Kích hoạt tiến trình tải xuống
            const downloadLink = document.createElement("a");
            document.body.appendChild(downloadLink);
            
            if (navigator.msSaveOrOpenBlob) {
                navigator.msSaveOrOpenBlob(blob, filename); // Cho IE
            } else {
                downloadLink.href = url;
                downloadLink.download = filename;
                downloadLink.click(); // Cho Chrome, Firefox, Edge...
            }
            
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
